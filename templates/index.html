<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Marketing</title>

    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="Outer-div">

    <div id="inner-div1">
        <h1>Bank Marketing Campaign Success Predictor</h1>
    </div>

    <div id="inner-div2">

        <form action="{{ url_for('predict') }}" method="POST">

            <label for="age">Age :</label>
            <input
                type="number"
                id="age"
                name="age"
                min="18"
                max="100"
                placeholder="Enter Age"
                required
            >
            <br><br>

            <label for="job">Job :</label>
            <select id="job" name="job" required>
                <option value="">Select Job</option>
                <option value="admin.">Admin</option>
                <option value="blue-collar">Blue Collar</option>
                <option value="entrepreneur">Entrepreneur</option>
                <option value="housemaid">Housemaid</option>
                <option value="management">Management</option>
                <option value="retired">Retired</option>
                <option value="self-employed">Self Employed</option>
                <option value="services">Services</option>
                <option value="student">Student</option>
                <option value="technician">Technician</option>
                <option value="unemployed">Unemployed</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="marital">Marital Status :</label>
            <select id="marital" name="marital" required>
                <option value="">Select Marital Status</option>
                <option value="divorced">Divorced</option>
                <option value="married">Married</option>
                <option value="single">Single</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="education">Education :</label>
            <select id="education" name="education" required>
                <option value="">Select Education</option>
                <option value="basic.4y">Basic 4 Years</option>
                <option value="basic.6y">Basic 6 Years</option>
                <option value="basic.9y">Basic 9 Years</option>
                <option value="high.school">High School</option>
                <option value="illiterate">Illiterate</option>
                <option value="professional.course">Professional Course</option>
                <option value="university.degree">University Degree</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="default">Credit in Default :</label>
            <select id="default" name="default" required>
                <option value="">Select</option>
                <option value="no">No</option>
                <option value="yes">Yes</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="housing">Housing Loan :</label>
            <select id="housing" name="housing" required>
                <option value="">Select</option>
                <option value="no">No</option>
                <option value="yes">Yes</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="loan">Personal Loan :</label>
            <select id="loan" name="loan" required>
                <option value="">Select</option>
                <option value="no">No</option>
                <option value="yes">Yes</option>
                <option value="unknown">Unknown</option>
            </select>
            <br><br>

            <label for="contact">Contact Type :</label>
            <select id="contact" name="contact" required>
                <option value="">Select Contact Type</option>
                <option value="cellular">Cellular</option>
                <option value="telephone">Telephone</option>
            </select>
            <br><br>

            <label for="month">Last Contact Month :</label>
            <select id="month" name="month" required>
                <option value="">Select Month</option>
                <option value="mar">March</option>
                <option value="apr">April</option>
                <option value="may">May</option>
                <option value="jun">June</option>
                <option value="jul">July</option>
                <option value="aug">August</option>
                <option value="sep">September</option>
                <option value="oct">October</option>
                <option value="nov">November</option>
                <option value="dec">December</option>
            </select>
            <br><br>

            <label for="day_of_week">Day of Week :</label>
            <select id="day_of_week" name="day_of_week" required>
                <option value="">Select Day</option>
                <option value="mon">Monday</option>
                <option value="tue">Tuesday</option>
                <option value="wed">Wednesday</option>
                <option value="thu">Thursday</option>
                <option value="fri">Friday</option>
            </select>
            <br><br>

            <label for="duration">Call Duration :</label>
            <input
                type="number"
                id="duration"
                name="duration"
                placeholder="Enter Duration"
                min="0"
                required
            >
            <br><br>

            <label for="campaign">Campaign :</label>
            <input
                type="number"
                id="campaign"
                name="campaign"
                placeholder="Campaign Contacts"
                min="1"
                required
            >
            <br><br>

            <label for="previous">Previous :</label>
            <input
                type="number"
                id="previous"
                name="previous"
                placeholder="Previous Contacts"
                min="0"
                required
            >
            <br><br>

            <label for="poutcome">Previous Outcome :</label>
            <select id="poutcome" name="poutcome" required>
                <option value="">Select Outcome</option>
                <option value="failure">Failure</option>
                <option value="nonexistent">Nonexistent</option>
                <option value="success">Success</option>
            </select>
            <br><br>

            <button type="submit">Predict</button>

        </form>

    </div>

    {% if isSub %}
    <div id="result-div">

        <h2>Prediction Result</h2>

        <p id="prediction">{{ isSub }}</p>

        {% if confidence %}
        <p id="confidence">
            <strong>Confidence Score:</strong> {{ confidence }}%
        </p>
        {% endif %}

    </div>
    {% endif %}

    {% if error %}
    <div id="error-div">
        {{ error }}
    </div>
    {% endif %}

</div>

</body>
</html>
